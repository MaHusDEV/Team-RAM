<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/public/css/general.css" />
    <link rel="stylesheet" href="/public/css/LoginHandler.css" />
    <title>Inloggen - MusicMatch</title>
  </head>

  <body class="container">
    <header class="header-container">
      <div>
        <a href="home.html">Startpagina</a>
        <a href="collection.html">Mijn collecties</a>
        <a href="">Kies je stemming</a>
        <a href="">Raad het lied</a>
        <a href="compare.html">Liedjes vergelijken</a>
      </div>
      <div>
        <button class="btn"><a href="login.html">Inloggen</a></button>
        <button class="btn"><a href="register.html">Registreren</a></button>

        <a href="profile.html">
          <img src="/public/assets/user.png" alt="Profiel" />
        </a>
      </div>
    </header>

    <main class="main-container">
      <div class="login-container main-gradiend-container">
        <h2>Inloggen</h2>

        <form action="/login" method="post">
          <div class="form-login">
            <label for="email">E-mailadres</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="musiclover@gmail.com"
              required
            />
          </div>

          <div class="form-login">
            <label for="password">Wachtwoord</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Voer je wachtwoord in"
              required
            />
          </div>

          <div class="form-login">
            <button class="btn" type="submit">Inloggen</button>
          </div>
        </form>

        <p>
          Nog geen account?
          <a href="register.html">Maak een account aan</a>
        </p>
      </div>
    </main>

    <footer class="footer-container">
      <p>© 2026 MusicMatch - WPL Project</p>
    </footer>
  </body>
</html>
